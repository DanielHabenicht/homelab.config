version: "3.7"

services:
  grampsweb: &grampsweb
    image: ghcr.io/gramps-project/grampsweb:latest
    restart: unless-stopped
    environment:
      GRAMPSWEB_NEW_DB_BACKEND: sqlite
      GRAMPSWEB_TREE: "Gramps Web"  # will create a new tree if not exists
      GRAMPSWEB_CELERY_CONFIG__broker_url: "redis://grampsweb_redis:6379/0"
      GRAMPSWEB_CELERY_CONFIG__result_backend: "redis://grampsweb_redis:6379/0"
      GRAMPSWEB_RATELIMIT_STORAGE_URI: redis://grampsweb_redis:6379/1
      GRAMPSWEB_BASE_URL: "https://gramps.home.aquiver.de"
      GRAMPSWEB_OIDC_ENABLED: true
      GRAMPSWEB_OIDC_ISSUER: "https://auth.home.aquiver.de"
      GRAMPSWEB_OIDC_CLIENT_ID: "7098db8d-1485-4000-a9ec-c4036547a792"
      GRAMPSWEB_OIDC_CLIENT_SECRET: "g3LnNzFPWcJns34bxl1HbGAfDz4cgTig"
      GRAMPSWEB_OIDC_NAME: "Pocket ID"
      GRAMPSWEB_OIDC_AUTO_REDIRECT: true
      GRAMPSWEB_OIDC_DISABLE_LOCAL_AUTH: true
    depends_on:
      - grampsweb_redis
    volumes:
      - gramps_users:/app/users  # persist user database
      - gramps_index:/app/indexdir  # persist search index
      - gramps_thumb_cache:/app/thumbnail_cache  # persist thumbnails
      - gramps_cache:/app/cache  # persist export and report caches
      - gramps_secret:/app/secret  # persist flask secret
      - gramps_db:/root/.gramps/grampsdb  # persist Gramps database
      - gramps_media:/app/media  # persist media files
      - gramps_tmp:/tmp
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_backbone"
      - "traefik.http.routers.gramps.rule=Host(`gramps.home.aquiver.de`)"
      - "traefik.http.routers.gramps.entrypoints=websecure"
      - "traefik.http.routers.gramps.tls=true"
      - "traefik.http.routers.gramps.tls.certresolver=wildcard-godaddy"
      - "traefik.http.routers.gramps.service=gramps-service@docker"
      - "traefik.http.services.gramps-service.loadbalancer.server.port=5000"
    networks:
      - no-internet
      - traefik_backbone

  grampsweb_celery:
    <<: *grampsweb  # YAML merge key copying the entire grampsweb service config
    ports: []
    container_name: grampsweb_celery
    depends_on:
      - grampsweb
      - grampsweb_redis
    command: celery -A gramps_webapi.celery worker --loglevel=INFO --concurrency=2
    labels: []

  grampsweb_redis:
    image: redis:alpine
    container_name: grampsweb_redis
    restart: always
    networks:
      - no-internet
      - traefik_backbone

volumes:
  gramps_users:
  gramps_index:
  gramps_thumb_cache:
  gramps_cache:
  gramps_secret:
  gramps_db:
  gramps_media:
  gramps_tmp:

networks:
  no-internet:
    driver: bridge
    internal: true
  traefik_backbone:
    external: true
