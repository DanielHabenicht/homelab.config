version: "3.9"

services:
  app:
    image: triliumnext/trilium:v0.103.0
    volumes:
      - ./trilium-data:/home/node/trilium-data
    restart: unless-stopped
#    user: '1000:1000'
    environment:
      TRILIUM_OAUTH_BASE_URL: "https://trilium.home.aquiver.de"
      TRILIUM_OAUTH_ISSUER_BASE_URL: "https://auth.home.aquiver.de"
      TRILIUM_OAUTH_ISSUER_NAME: "Pocket ID"
      TRILIUM_OAUTH_CLIENT_ID: "8f3cad8d-e489-4504-ae5f-62a708caca8c"
      TRILIUM_OAUTH_CLIENT_SECRET: "Y6WXskuSidudhV7xtxSXLzp6P0dIJRXY"
      TRILIUM_MULTIFACTORAUTHENTICATION_OAUTHBASEURL: "https://trilium.home.aquiver.de"
      TRILIUM_MULTIFACTORAUTHENTICATION_OAUTHISSUERBASEURL: "https://auth.home.aquiver.de"
      TRILIUM_MULTIFACTORAUTHENTICATION_OAUTHISSUERNAME: "Pocket ID"
      TRILIUM_MULTIFACTORAUTHENTICATION_OAUTHCLIENTID: "8f3cad8d-e489-4504-ae5f-62a708caca8c"
      TRILIUM_MULTIFACTORAUTHENTICATION_OAUTHCLIENTSECRET: "Y6WXskuSidudhV7xtxSXLzp6P0dIJRXY"
    networks:
      - default
      - traefik_backbone
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_backbone"
      - "traefik.http.routers.trilium.rule=Host(`trilium.${SUBDOMAIN:-home}.aquiver.de`)"
      - "traefik.http.routers.trilium.service=trilium-service@docker"
      - "traefik.http.services.trilium-service.loadbalancer.server.port=8080"
      - "homepage.group=Media"
      - "homepage.name=Trilium"
      - "homepage.icon=trilium"
      - "homepage.href=https://trilium.${SUBDOMAIN:-home}.aquiver.de"


networks:
  default:
    driver: bridge
    internal: true
  traefik_backbone:
    external: true
