services:
  actual_server:
    image: docker.io/actualbudget/actual-server:26.4.0
#    ports:
      # This line makes Actual available at port 5006 of the device you run the server on,
      # i.e. http://localhost:5006. You can change the first number to change the port, if you want.
      # - '5006:5006'
    environment:
      ACTUAL_OPENID_DISCOVERY_URL: "https://auth.home.aquiver.de/.well-known/openid-configuration"
      ACTUAL_OPENID_CLIENT_ID: "27f29969-89ff-4ed8-9d88-9380defc0646"
      ACTUAL_OPENID_CLIENT_SECRET: "K41BUIuWUSmDBRtHTYQgwsGhbxZVI4K4"
      ACTUAL_OPENID_SERVER_HOSTNAME: "https://finance.home.aquiver.de/"
      ACTUAL_OPENID_ENFORCE: true
      # Uncomment any of the lines below to set configuration options.
      # - ACTUAL_HTTPS_KEY=/data/selfhost.key
      # - ACTUAL_HTTPS_CERT=/data/selfhost.crt
      # - ACTUAL_PORT=5006
      # - ACTUAL_UPLOAD_FILE_SYNC_SIZE_LIMIT_MB=20
      # - ACTUAL_UPLOAD_SYNC_ENCRYPTED_FILE_SYNC_SIZE_LIMIT_MB=50
      # - ACTUAL_UPLOAD_FILE_SIZE_LIMIT_MB=20
      # See all options and more details at https://actualbudget.github.io/docs/Installing/Configuration
      # !! If you are not using any of these options, remove the 'environment:' tag entirely.
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_backbone"
      - "traefik.http.routers.actual.rule=Host(`finance.home.aquiver.de`)"
      - "traefik.http.routers.actual.service=actual-service@docker"
      - "traefik.http.services.actual-service.loadbalancer.server.port=5006"
      - "homepage.group=Applications"
      - "homepage.name=Actual"
      - "homepage.icon=actual-budget"
      - "homepage.href=https://finance.home.aquiver.de/"
    volumes:
      # Change './actual-data' below to the path to the folder you want Actual to store its data in on your server.
      # '/data' is the path Actual will look for its files in by default, so leave that as-is.
      - ./actual-data:/data
    healthcheck:
      # Enable health check for the instance
      test: ["CMD-SHELL", "node src/scripts/health-check.js"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - internet
      - traefik_backbone

networks:
  no-internet:
    driver: bridge
    internal: true
  internet:
    driver: bridge
  traefik_backbone:
    external: true
